name: Generate IPTV EPG

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  epg:
    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:

      # =========================================================
      # CHECKOUT
      # =========================================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================================================
      # NODE.JS
      # =========================================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================================================
      # PYTHON
      # =========================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================================================
      # INSTALL SYSTEM DEPENDENCIES
      # =========================================================
      - name: Install System Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            gzip \
            jq \
            curl \
            wget \
            xmlstarlet

      # =========================================================
      # CLONE IPTV-ORG EPG
      # =========================================================
      - name: Clone IPTV-ORG EPG
        run: |
          rm -rf epg

          git clone --depth=1 \
            https://github.com/iptv-org/epg.git

      # =========================================================
      # INSTALL NPM DEPENDENCIES
      # =========================================================
      - name: Install EPG Dependencies
        run: |
          cd epg

          npm install

      # =========================================================
      # CREATE REQUIRED FOLDERS
      # =========================================================
      - name: Create Required Folders
        run: |
          mkdir -p output
          mkdir -p epg/sites/custom
          mkdir -p logs

      # =========================================================
      # VALIDATE XML EXISTS
      # =========================================================
      - name: Validate XML File Exists
        run: |

          if [ ! -f channels/merged.channels.xml ]; then
            echo "ERRO: channels/merged.channels.xml não encontrado"
            exit 1
          fi

      # =========================================================
      # FIX XML FORMAT
      # =========================================================
      - name: Normalize XML
        run: |
          python3 << 'EOF'

          import xml.etree.ElementTree as ET

          xml_file = 'channels/merged.channels.xml'

          try:
              tree = ET.parse(xml_file)
              root = tree.getroot()

              if root.tag != 'channels':
                  raise Exception('Root inválido')

              tree.write(
                  xml_file,
                  encoding='utf-8',
                  xml_declaration=True
              )

              print('XML validado com sucesso')

          except Exception as e:
              print(f'ERRO XML: {e}')
              exit(1)

          EOF

      # =========================================================
      # COPY CHANNELS
      # =========================================================
      - name: Copy Channels XML
        run: |
          cp channels/merged.channels.xml \
             epg/sites/custom/channels.xml

      # =========================================================
      # REMOVE DUPLICATES
      # =========================================================
      - name: Remove Duplicate Channels
        run: |
          python3 << 'EOF'

          import xml.etree.ElementTree as ET

          file = 'epg/sites/custom/channels.xml'

          tree = ET.parse(file)
          root = tree.getroot()

          seen = set()
          removed = 0

          for ch in list(root.findall('channel')):

              key = (
                  ch.attrib.get('site', ''),
                  ch.attrib.get('site_id', ''),
                  ch.attrib.get('xmltv_id', '')
              )

              if key in seen:
                  root.remove(ch)
                  removed += 1
              else:
                  seen.add(key)

          tree.write(
              file,
              encoding='utf-8',
              xml_declaration=True
          )

          print(f'Duplicados removidos: {removed}')

          EOF

      # =========================================================
      # FILTER INVALID PROVIDERS
      # =========================================================
      - name: Remove Invalid Providers
        run: |
          python3 << 'EOF'

          import os
          import xml.etree.ElementTree as ET

          xml_file = 'epg/sites/custom/channels.xml'

          tree = ET.parse(xml_file)
          root = tree.getroot()

          valid_sites = set()

          for item in os.listdir('epg/sites'):
              path = os.path.join('epg/sites', item)

              if os.path.isdir(path):
                  valid_sites.add(item)

          removed = 0

          for channel in list(root.findall('channel')):

              site = channel.attrib.get('site')

              if site not in valid_sites:
                  root.remove(channel)
                  removed += 1

          tree.write(
              xml_file,
              encoding='utf-8',
              xml_declaration=True
          )

          print(f'Providers inválidos removidos: {removed}')

          EOF

      # =========================================================
      # VALIDATE CHANNEL COUNT
      # =========================================================
      - name: Validate Channel Count
        run: |

          TOTAL=$(grep -c "<channel" epg/sites/custom/channels.xml || true)

          echo "TOTAL DE CANAIS: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "ERRO: nenhum canal válido encontrado"
            exit 1
          fi

      # =========================================================
      # SHOW CHANNELS
      # =========================================================
      - name: Debug Channels
        run: |
          cat epg/sites/custom/channels.xml

      # =========================================================
      # GENERATE EPG
      # =========================================================
      - name: Generate EPG
        run: |

          cd epg

          npm run grab -- \
            --channels=./sites/custom/channels.xml \
            --output=../output/guide.xml \
            --days=3 \
            --timeout=120000 \
            --maxConnections=1 \
            --gzip=false \
            --debug || true

      # =========================================================
      # SHOW LOG FILES
      # =========================================================
      - name: Show Logs
        run: |

          echo "===== LOG FILES ====="

          find epg -name "*.log" -exec cat {} \; || true

      # =========================================================
      # VERIFY OUTPUT
      # =========================================================
      - name: Verify Output
        run: |

          echo "===== OUTPUT ====="

          ls -lah output || true

          if [ ! -s output/guide.xml ]; then
            echo "ERRO: guide.xml não foi gerado"

            echo "===== DEBUG ====="

            find epg -name "*.log" -exec cat {} \; || true

            exit 1
          fi

      # =========================================================
      # VALIDATE XML OUTPUT
      # =========================================================
      - name: Validate Generated XML
        run: |

          xmlstarlet val output/guide.xml || true

      # =========================================================
      # COMPRESS XML
      # =========================================================
      - name: Compress XML
        run: |

          gzip -fk output/guide.xml

      # =========================================================
      # MOVE FINAL FILES
      # =========================================================
      - name: Move Final Files
        run: |

          cp output/guide.xml ./guide.xml

          cp output/guide.xml.gz ./guide.xml.gz

      # =========================================================
      # GIT STATUS
      # =========================================================
      - name: Git Status
        run: |

          git status

      # =========================================================
      # COMMIT
      # =========================================================
      - name: Commit Files
        run: |

          git config --global user.name \
            "github-actions[bot]"

          git config --global user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add guide.xml
          git add guide.xml.gz

          git commit -m "Auto Update EPG" || \
            echo "Nenhuma alteração"

      # =========================================================
      # PUSH
      # =========================================================
      - name: Push Files
        run: |

          git push
